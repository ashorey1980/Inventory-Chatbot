<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Chatbot - Powered by MuleSoft AI Gateway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .api-key-section {
            padding: 30px;
            border-bottom: 1px solid #e0e0e0;
        }

        .api-key-section.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        .help-text a {
            color: #667eea;
            text-decoration: none;
        }

        .help-text a:hover {
            text-decoration: underline;
        }

        .chat-section {
            display: none;
            flex-direction: column;
            height: 600px;
        }

        .chat-section.active {
            display: flex;
        }

        .chat-header {
            padding: 15px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .reset-btn {
            padding: 6px 12px;
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .reset-btn:hover {
            background: #ff1744;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
        }

        .message.user {
            text-align: right;
        }

        .message.user .message-content {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message.system {
            text-align: center;
        }

        .message.system .message-content {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            font-size: 12px;
            padding: 8px 12px;
        }

        .tool-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #4caf50;
            color: white;
            border-radius: 4px;
            font-size: 11px;
            margin-top: 8px;
            margin-right: 4px;
        }

        .message-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
            font-size: 10px;
        }

        .model-badge {
            padding: 4px 8px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 4px;
            font-weight: 600;
        }

        .token-badge {
            padding: 4px 8px;
            background: #f5f5f5;
            color: #666;
            border-radius: 4px;
        }

        .input-area {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-container {
            display: flex;
            gap: 10px;
        }

        .input-container input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .input-container input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .examples {
            padding: 15px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .examples-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }

        .example-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .example-chip {
            padding: 6px 12px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .example-chip:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: loading 1.4s infinite ease-in-out both;
        }

        .loading:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes loading {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        .error-message {
            padding: 12px;
            background: #ffebee;
            color: #c62828;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Inventory Chatbot</h1>
            <p>Powered by MuleSoft AI Gateway</p>
        </div>

        <!-- LLM Proxy Configuration Section -->
        <div class="api-key-section" id="apiKeySection">
            <div class="form-group">
                <label for="proxyEndpoint">LLM Proxy Endpoint</label>
                <input
                    type="text"
                    id="proxyEndpoint"
                    placeholder="https://your-proxy.example.com/api/chat"
                    autocomplete="off"
                />
                <p class="help-text">
                    Enter the URL of your LLM Proxy endpoint
                </p>
            </div>
            <div class="form-group">
                <label for="clientId">Client ID</label>
                <input
                    type="text"
                    id="clientId"
                    placeholder="your-client-id"
                    autocomplete="off"
                />
            </div>
            <div class="form-group">
                <label for="clientSecret">Client Secret</label>
                <input
                    type="password"
                    id="clientSecret"
                    placeholder="your-client-secret"
                    autocomplete="off"
                />
            </div>
            <button class="btn" id="startBtn" onclick="initializeChat()">
                Start Chatting
            </button>
            <div id="errorContainer"></div>
        </div>

        <!-- Chat Section -->
        <div class="chat-section" id="chatSection">
            <div class="chat-header">
                <div class="chat-status">
                    <span class="status-dot"></span>
                    <span>Connected</span>
                </div>
                <button class="reset-btn" onclick="resetChat()">Reset</button>
            </div>

            <div class="messages" id="messages">
                <div class="message system">
                    <div class="message-content">
                        👋 Hello! I'm your inventory assistant. Ask me about products or warehouses!
                    </div>
                </div>
            </div>

            <div class="examples">
                <div class="examples-title">💡 Try asking:</div>
                <div class="example-chips">
                    <div class="example-chip" onclick="sendExample('What is product 912?')">
                        What is product 912?
                    </div>
                    <div class="example-chip" onclick="sendExample('Show me warehouse 18')">
                        Show me warehouse 18
                    </div>
                    <div class="example-chip" onclick="sendExample('Tell me about the Standing Desk')">
                        Tell me about the Standing Desk
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <input
                        type="text"
                        id="messageInput"
                        placeholder="Type your message..."
                        onkeypress="handleKeyPress(event)"
                    />
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        Send
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sessionId = null;

        async function initializeChat() {
            const proxyEndpoint = document.getElementById('proxyEndpoint').value.trim();
            const clientId = document.getElementById('clientId').value.trim();
            const clientSecret = document.getElementById('clientSecret').value.trim();
            const errorContainer = document.getElementById('errorContainer');
            const startBtn = document.getElementById('startBtn');

            errorContainer.innerHTML = '';

            if (!proxyEndpoint) {
                showError('Please enter the LLM Proxy Endpoint');
                return;
            }
            if (!clientId) {
                showError('Please enter the Client ID');
                return;
            }
            if (!clientSecret) {
                showError('Please enter the Client Secret');
                return;
            }

            startBtn.disabled = true;
            startBtn.textContent = 'Initializing...';

            try {
                const response = await fetch('/api/init', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ proxyEndpoint, clientId, clientSecret }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to initialize chat');
                }

                sessionId = data.sessionId;
                document.getElementById('apiKeySection').classList.add('hidden');
                document.getElementById('chatSection').classList.add('active');
            } catch (error) {
                showError(error.message);
                startBtn.disabled = false;
                startBtn.textContent = 'Start Chatting';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            addMessage('user', message);
            input.value = '';

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            addLoadingMessage();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        sessionId,
                        message,
                    }),
                });

                const data = await response.json();

                removeLoadingMessage();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to send message');
                }

                addMessage('assistant', data.message, data.toolCalled, data.tokens, data.model);
            } catch (error) {
                removeLoadingMessage();
                addMessage('system', '❌ Error: ' + error.message);
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function addMessage(type, content, toolCalled = null, tokens = null, model = null) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            // Add metadata for assistant messages
            if (type === 'assistant' && (toolCalled || tokens)) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'message-meta';

                if (toolCalled) {
                    const toolBadge = document.createElement('span');
                    toolBadge.className = 'tool-badge';
                    toolBadge.textContent = `🔧 ${toolCalled}`;
                    metaDiv.appendChild(toolBadge);
                }

                if (tokens) {
                    const totalTokens = tokens.input + tokens.output;
                    const tokenBadge = document.createElement('span');
                    tokenBadge.className = 'token-badge';
                    tokenBadge.textContent = `📊 Prompt: ${tokens.input} | Total: ${totalTokens}`;
                    metaDiv.appendChild(tokenBadge);
                }

                contentDiv.appendChild(metaDiv);
            }

            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addLoadingMessage() {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'loadingMessage';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<span class="loading"></span> <span class="loading"></span> <span class="loading"></span>';

            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeLoadingMessage() {
            const loadingMsg = document.getElementById('loadingMessage');
            if (loadingMsg) {
                loadingMsg.remove();
            }
        }

        function sendExample(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function resetChat() {
            if (confirm('Are you sure you want to reset the chat?')) {
                location.reload();
            }
        }

        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
        }

        // Focus proxy endpoint input on load
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('proxyEndpoint').focus();
        });
    </script>
</body>
</html>
